name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            laravel: '11.*'
            testbench: '^9.0'
            pest: '^3.8'
            pest_plugin: '^3.0'
          - php: '8.3'
            laravel: '11.*'
            testbench: '^9.0'
            pest: '^3.8'
            pest_plugin: '^3.0'
          - php: '8.3'
            laravel: '12.*'
            testbench: '^10.0'
            pest: '^4.0'
            pest_plugin: '^4.0'

    name: PHP ${{ matrix.php }} — Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_sqlite, mbstring, gd
          coverage: none

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" "pestphp/pest:${{ matrix.pest }}" "pestphp/pest-plugin-drift:${{ matrix.pest_plugin }}" "pestphp/pest-plugin-laravel:${{ matrix.pest_plugin }}" --dev --no-interaction --no-update
          composer update --prefer-dist --no-interaction --with-all-dependencies

      - name: Run tests
        run: vendor/bin/pest
